name: River CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: node --check server.js && node --check api/index.js && node --check realtime-gateway/src/index.js
      - run: node --check scripts/backup.mjs && node --check scripts/restore-backup.mjs && node --check scripts/memory-eval.mjs && node --check scripts/load-test.mjs && node --check scripts/regression-check.mjs
      - run: npm run check:regression
      - run: npm run build
